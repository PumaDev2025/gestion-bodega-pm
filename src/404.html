<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Puga Mujica — Gestión de Bodega</title>
  <script>
    // GitHub Pages SPA redirect: redirige 404 al index.html preservando la ruta
    var pathSegmentsToKeep = 1; // 1 porque el repo está en /gestion-bodega-pm/
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
