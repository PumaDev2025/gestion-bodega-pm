<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <span class="login-logo">⛏</span>
      <h1>Bodega<strong>PM</strong></h1>
      <p class="login-subtitle">Puga Mujica — Gestión de Bodega en Obra</p>
    </div>

    <form (ngSubmit)="onLogin()" class="login-form">
      @if (error()) {
        <div class="error-msg">
          <span>⚠️</span> {{ error() }}
        </div>
      }

      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <div class="input-wrapper">
          <span class="input-icon">📧</span>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="usuario@pugamujica.cl"
            required
            autocomplete="email"
          >
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-wrapper">
          <span class="input-icon">🔒</span>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            required
            autocomplete="current-password"
          >
        </div>
      </div>

      <button type="submit" class="btn-login" [disabled]="loading() || !email || !password">
        @if (loading()) {
          <span class="spinner"></span> Ingresando...
        } @else {
          Iniciar Sesión
        }
      </button>
    </form>

    <div class="login-footer">
      <p class="demo-info">
        <strong>Demo — Credenciales de prueba:</strong>
      </p>
      <div class="demo-credentials">
        <div class="credential">
          <span class="cred-role">👨‍💼 Admin</span>
          <span class="cred-data">admin&#64;pugamujica.cl / admin123</span>
        </div>
        <div class="credential">
          <span class="cred-role">👷‍♀️ Encargado</span>
          <span class="cred-data">maria&#64;pugamujica.cl / bodega123</span>
        </div>
      </div>
    </div>
  </div>
</div>
